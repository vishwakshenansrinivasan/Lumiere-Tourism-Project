<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumiere - Login</title>
    <link rel="icon" href="/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/app.css">
    <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
</head>
<body>
    <!-- Glass Navbar -->
    <div id="navbar"
class="navbar fixed top-4 inset-x-0 mx-auto w-[85%]
bg-white/10 backdrop-blur-md border border-white/20
rounded-xl shadow-lg px-4 py-0 z-50
transition-all duration-300">

<!-- Logo -->
<div class="flex-1">
<a href="/index.html"
class="text-lg font-extrabold text-yellow-500 hover:text-black hover:text-xl transition-all duration-300 ease-in-out tracking-wide">
Lumiere
</a>
</div>

<!-- Right Side -->
<div class="flex items-center gap-4">

<ul class="menu menu-horizontal px-1 text-sm text-black">

<li><a href="/index.html" class="px-3 py-1 hover:text-yellow-400 hover:bg-black hover:text-white transition-all hover:font-bold duration-300 ease-in-out rounded-lg">Home</a></li>

<li><a href="/Pages/dashboard.html" class="px-3 py-1 hover:text-yellow-400 hover:bg-black hover:text-white transition-all hover:font-bold duration-300 ease-in-out rounded-lg">Dashboard</a></li>

<li><a href="/Pages/admin/adminlogin.html" class="px-3 py-1 hover:text-yellow-400 hover:bg-black hover:text-white transition-all hover:font-bold duration-300 ease-in-out rounded-lg">Admin</a></li>

<li><a href="/Pages/tours.html" class="px-3 py-1 hover:text-yellow-400 hover:bg-black hover:text-white transition-all hover:font-bold duration-300 ease-in-out rounded-lg">Tours</a></li>

<li><a href="/Pages/contact.html" class="px-3 py-1 hover:text-yellow-400 hover:bg-black hover:text-white transition-all hover:font-bold duration-300 ease-in-out rounded-lg">Contact</a></li>

</ul>

<!-- Login Button -->
<% if (typeof user !== 'undefined' && user) { %>
    <button class="px-4 py-2 bg-yellow-400 text-black font-bold rounded-lg hover:text-lg hover:bg-black hover:text-white transition-all duration-300 gap-2 flex items-center" onclick="location.href='/api/auth/logout'">Logout (<%= user.username %>)</button>
<% } else if (typeof admin !== 'undefined' && admin) { %>
    <button class="px-4 py-2 bg-yellow-400 text-black font-bold rounded-lg hover:text-lg hover:bg-black hover:text-white transition-all duration-300 gap-2 flex items-center" onclick="location.href='/api/auth/admin/logout'">Logout (Admin)</button>
<% } else { %>
    <button class="px-4 py-2 bg-yellow-400 text-black font-bold rounded-lg hover:text-lg hover:bg-black hover:text-white transition-all duration-300" onclick="location.href='/Pages/login.html'">Login</button>
<% } %>


</div>

</div>
    <script>
    let prevScroll = window.pageYOffset;
    const navbar = document.getElementById("navbar");

    window.onscroll = function(){

    let currentScroll = window.pageYOffset;

    if(prevScroll > currentScroll){
    navbar.classList.remove("-translate-y-32", "opacity-0");
    }else{
    navbar.classList.add("-translate-y-32", "opacity-0");
    }
    if(currentScroll > 50){
    navbar.classList.add("scale-95");
    }else{
    navbar.classList.remove("scale-95");
    }
    prevScroll = currentScroll;

    }

    </script>

    <section class="max-w-7xl mx-auto px-8 py-16 text-white">
    <div class="flex h-full w-full">
    <div class="w-full hidden md:inline-block">
        <img class="h-full" src="https://raw.githubusercontent.com/prebuiltui/prebuiltui/main/assets/login/leftSideImage.png" alt="leftSideImage">
    </div>

    <div class="w-full flex flex-col items-center justify-center">

        <form action="/api/auth/login" method="POST" class="md:w-96 w-80 flex flex-col items-center justify-center">
            <h2 class="text-4xl text-gray-900 font-medium">Sign in</h2>
            <p class="text-sm text-gray-500/90 mt-3">Welcome back! Please sign in to continue</p>

            

            <div class="flex items-center gap-4 w-full my-5">
                <div class="w-full h-px bg-gray-300/90"></div>
                <p class="w-full text-nowrap text-sm text-gray-500/90"> Sign in with email</p>
                <div class="w-full h-px bg-gray-300/90"></div>
            </div>

            <div class="flex items-center w-full bg-transparent border border-gray-300/60 h-12 rounded-full overflow-hidden pl-6 gap-2">
                <svg width="16" height="11" viewBox="0 0 16 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M0 .55.571 0H15.43l.57.55v9.9l-.571.55H.57L0 10.45zm1.143 1.138V9.9h13.714V1.69l-6.503 4.8h-.697zM13.749 1.1H2.25L8 5.356z" fill="#6B7280"/>
                </svg>
                <input type="email" name="email" placeholder="Email id" class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full" required>                 
            </div>

            <div class="flex items-center mt-6 w-full bg-transparent border border-gray-300/60 h-12 rounded-full overflow-hidden pl-6 gap-2">
                <svg width="13" height="17" viewBox="0 0 13 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 8.5c0-.938-.729-1.7-1.625-1.7h-.812V4.25C10.563 1.907 8.74 0 6.5 0S2.438 1.907 2.438 4.25V6.8h-.813C.729 6.8 0 7.562 0 8.5v6.8c0 .938.729 1.7 1.625 1.7h9.75c.896 0 1.625-.762 1.625-1.7zM4.063 4.25c0-1.406 1.093-2.55 2.437-2.55s2.438 1.144 2.438 2.55V6.8H4.061z" fill="#6B7280"/>
                </svg>
                <input type="password" name="password" placeholder="Password" class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full" required>
            </div>

           

            <button type="submit" class="mt-8 w-full h-11 rounded-full text-white bg-indigo-500 hover:opacity-90 transition-opacity">
                Login
            </button>
            <p class="text-gray-500/90 text-sm mt-4">Don’t have an account? <a class="text-indigo-400 hover:underline" href="/Pages/register.html">Sign up</a></p>
        </form>
    </div>
</div>
</body>
</html>
