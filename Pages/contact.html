<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">

  <style>
    
    .nav-hidden {
      
      transform: translateY(-100%) translateX(-50%);
    }

    
    .bg-purple-header {
      background-image: url('../images/scenary.jpg');
      border-bottom-left-radius: 50px;
      border-bottom-right-radius: 50px;
    }

    
    #navbar {
      transition: all 0.3s ease-in-out;
    }
  </style>

</head>

<body class="min-h-screen bg-white">

<!-- Navbar -->
    <div id="navbar"
class="navbar fixed top-4 left-1/2 -translate-x-1/2 w-[85%]
bg-white/10 backdrop-blur-md border border-white/20
rounded-xl shadow-lg px-4 py-0 z-50
transition-all duration-300">

<!-- Logo -->
<div class="flex-1">
<a href="/index.html"
class="text-lg font-extrabold text-yellow-500 hover:text-black hover:text-xl transition duration-75 ease-in-out tracking-wide">
Lumiere
</a>
</div>

<!-- Right Side -->
<div class="flex items-center gap-4">

<ul class="menu menu-horizontal px-1 text-sm text-black">

<li><a href="/index.html" class="px-3 py-1 hover:bg-gray-400/30 hover:text-yellow-400 rounded-lg">Home</a></li>

<li><a href="/Pages/dashboard.html" class="px-3 py-1 hover:bg-cyan-50 hover:text-yellow-400 rounded-lg">Dashboard</a></li>

<li><a href="/Pages/tours.html" class="px-3 py-1 hover:bg-cyan-50 hover:text-yellow-400 rounded-lg">Tours</a></li>

<li><a href="/Pages/contact.html" class="px-3 py-1 hover:bg-cyan-50 hover:text-yellow-400 rounded-lg">Contact</a></li>

</ul>

<!-- Login Button -->
<button
class="px-4 py-2 bg-yellow-400 text-black font-bold rounded-lg
hover:bg-yellow-500 hover:text-lg transition duration-300"
onclick="location.href='/Pages/login.html'">

Login

</button>

</div>

</div>
    <script>
    let prevScroll = window.pageYOffset;
    const navbar = document.getElementById("navbar");

    window.onscroll = function(){

    let currentScroll = window.pageYOffset;

    if(prevScroll > currentScroll){
    navbar.classList.remove("nav-hidden");
    }else{
    navbar.classList.add("nav-hidden");
    }
    if(currentScroll > 50){
    navbar.classList.add("scale-95");
    }else{
    navbar.classList.remove("scale-95");
    }
    prevScroll = currentScroll;

    }

    </script>

    <section class="bg-purple-header pt-40 pb-32 px-8 text-white text-center md:text-left">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start">
        <div class="w-full md:w-1/2">
            <h1 class="text-5xl font-extrabold mb-6 ">Get In Touch</h1>
            <p class="text-lg opacity-90 max-w-md">
                Feel free to contact us! Submit your queries here and we will get back to you as soon as possible.
            </p>
        </div>
    </div>
</section>

<section class="max-w-7xl mx-auto px-8 -mt-24 pb-20">
    <div class="flex flex-col md:flex-row gap-12 items-start">
        
        <div class="w-full md:w-1/2 space-y-10 pt-32 text-gray-800">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-gray-100 rounded-full text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                </div>
                <span class="font-medium">1234567890</span>
            </div>

            <div class="flex items-center gap-4">
                <div class="p-3 bg-gray-100 rounded-full text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                </div>
                <span class="font-medium">support@lumiere-tourism.com</span>
            </div>

            <div class="flex items-center gap-4">
                <div class="p-3 bg-gray-100 rounded-full text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </div>
                <span class="font-medium">696, Dubai Kurukku Sandhu, Dubai Colony, Dubai</span>
            </div>

            <div class="flex gap-3 pt-4">
                <button class="btn btn-circle btn-sm bg-blue-600 text-white border-none hover:bg-blue-700">f</button>
                <button class="btn btn-circle btn-sm bg-pink-500 text-white border-none hover:bg-pink-600">ig</button>
                <button class="btn btn-circle btn-sm bg-black text-white border-none hover:bg-gray-800">𝕏</button>
                <button class="btn btn-circle btn-sm bg-blue-800 text-white border-none hover:bg-blue-900">in</button>
            </div>
        </div>

        <div class="card w-full max-w-lg bg-base-100 shadow-2xl p-8 rounded-3xl border border-gray-100">
            <h2 class="text-2xl font-bold text-transparent bg-gradient-to-tr bg-clip-text from-blue-500 via-pink-500 to-red-500 dark:from-sky-300 dark:via-pink-300 dark:to-red-500 mb-6">Send Us Message</h2>
            
            <form action="#" class="space-y-4">
                <input type="text" placeholder="Name" class="input input-bordered w-full bg-gray-50 focus:border-indigo-500" required />
                
                <input type="email" placeholder="Email" class="input input-bordered w-full bg-gray-50 focus:border-indigo-500" required />
                
                <textarea placeholder="Message" class="textarea textarea-bordered w-full h-32 bg-gray-50 focus:border-indigo-500"></textarea>
                
                <button type="submit" class="btn w-full bg-gradient-to-tr from-blue-500 via-pink-500 to-red-500 dark:from-sky-300 dark:via-pink-300 dark:to-red-500 hover:bg-indigo-700 text-white border-4 hover:border-gray-100/25 hover:text-xl hover:text-black hover:font-extrabold transition-all duration-300 rounded-full mt-4">
                    
                    Submit
                </button>
            </form>
        </div>

    </div>
</section>
</body>
</html>
