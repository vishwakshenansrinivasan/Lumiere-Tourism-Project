Login

</div>

</div>
    <script>
    let prevScroll = window.pageYOffset;
    const navbar = document.getElementById("navbar");

    window.onscroll = function(){

    let currentScroll = window.pageYOffset;

    if(prevScroll > currentScroll){
    navbar.classList.remove("nav-hidden");
    }else{
    navbar.classList.add("nav-hidden");
    }
    if(currentScroll > 50){
    navbar.classList.add("scale-95");
    }else{
    navbar.classList.remove("scale-95");
    }
    prevScroll = currentScroll;

    }

    </script>

    <section class="max-w-7xl mx-auto px-8 py-16 text-white">

<!-- Hero -->
        <section class="flex items-center flex-1">

                    <button class="px-6 py-3 text-sm font-medium tracking-wide text-white capitalize transition-colors duration-300 transform bg-blue-500 rounded-md hover:bg-blue-600 focus:bg-blue-600 focus:outline-none sm:mx-2">
                        Notify Me

                <p class="mt-8 text-center text-gray-700 dark:text-black text-md md:text-xl">Notify me when App is launched :)</p>

        </section>

        
    </div>
</section>
