<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumiere - Admin Login</title>
    <link rel="icon" href="/images/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide">
    <link rel="stylesheet" href="assets/css/vendor/font-awesome.css">
    <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css">
    <link rel="stylesheet" href="src/output.css">
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.js"></script>

    <style>
        .nav-hidden{
            transform: translateY(-100%);
        }
    </style>
</head>
<body>
    <!-- Glass Navbar -->
    <div id="navbar"
class="navbar fixed top-4 inset-x-0 mx-auto w-[85%]
bg-white/10 backdrop-blur-md border border-white/20
rounded-xl shadow-lg px-4 py-0 z-50
transition-all duration-300">

<!-- Logo -->
<div class="flex-1">
<a href="/index.html"
class="text-lg font-extrabold text-yellow-500 hover:text-black hover:text-xl transition-all duration-300 ease-in-out tracking-wide">
Lumiere
</a>
</div>

<!-- Right Side -->
<div class="flex items-center gap-4">

<ul class="menu menu-horizontal px-1 text-sm text-black">

</ul>

<!-- Login Button -->
<button
class="px-4 py-2 bg-yellow-400 text-black font-bold rounded-lg
hover:text-lg hover:bg-black hover:text-white transition-all duration-300"
onclick="location.href='/index.html'">

Exit

</button>

</div>

</div>
    <script>
    let prevScroll = window.pageYOffset;
    const navbar = document.getElementById("navbar");

    window.onscroll = function(){

    let currentScroll = window.pageYOffset;

    if(prevScroll > currentScroll){
    navbar.classList.remove("-translate-y-32", "opacity-0");
    }else{
    navbar.classList.add("-translate-y-32", "opacity-0");
    }
    if(currentScroll > 50){
    navbar.classList.add("scale-95");
    }else{
    navbar.classList.remove("scale-95");
    }
    prevScroll = currentScroll;

    }

    </script>
    <div class="min-h-screen flex items-center justify-center bg-gray-50">
        <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-xl shadow-lg">
            <div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                    Admin Login
                </h2>
            </div>
            <form class="mt-8 space-y-6" action="#" method="POST">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <label for="email-address" class="sr-only">Email address</label>
                        <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="Email address">
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="Password">
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Sign in
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
