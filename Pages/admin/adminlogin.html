<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="/images/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide">
    <link rel="stylesheet" href="assets/css/vendor/font-awesome.css">
    <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/adminlogin.css">
    <link rel="stylesheet" href="src/output.css">
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

    <style>
        .nav-hidden{
            transform: translateY(-100%);
        }
    </style>
</head>
<body class="min-h-screen bg-black/60 flex items-center justify-center ">
    <!-- Glass Navbar -->
    <div id="navbar"
class="navbar fixed top-4 inset-x-0 mx-auto w-[85%]
bg-white/10 backdrop-blur-md border border-white/20
rounded-xl shadow-lg px-4 py-0 z-50
transition-all duration-300">

<!-- Logo -->
<div class="flex-1">
<a href="/index.html"
class="text-lg font-extrabold text-yellow-500 hover:text-black hover:text-xl transition-all duration-300 ease-in-out tracking-wide">
Lumiere
</a>
</div>

<!-- Right Side -->
<div class="flex items-center gap-4">

<ul class="menu menu-horizontal px-1 text-sm text-black">

</ul>

<!-- Login Button -->
<button
class="px-4 py-2 bg-yellow-400 text-black font-bold rounded-lg
hover:text-lg hover:bg-black hover:text-white transition-all duration-300"
onclick="alert('Exiting Admin Panel!'); location.href='/index.html';">

Exit

</button>

</div>

</div>
    <script>
    let prevScroll = window.pageYOffset;
    const navbar = document.getElementById("navbar");

    window.onscroll = function(){

    let currentScroll = window.pageYOffset;

    if(prevScroll > currentScroll){
    navbar.classList.remove("-translate-y-32", "opacity-0");
    }else{
    navbar.classList.add("-translate-y-32", "opacity-0");
    }
    if(currentScroll > 50){
    navbar.classList.add("scale-95");
    }else{
    navbar.classList.remove("scale-95");
    }
    prevScroll = currentScroll;

    }

    </script>
    
        <div class="float-pin">📍</div>
        <div class="float-plane">✈️</div>
<div class="h-96 flex items-center justify-center bg-gradient-to-r from-purple-400 via-pink-500 to-red-500">
  <div class="relative">
    <div class="absolute -top-2 -left-2 -right-2 -bottom-2 rounded-lg bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 shadow-lg animate-pulse"></div>
    <div id="form-container" class="bg-white p-16 rounded-lg shadow-2xl w-80 relative z-10 transform transition duration-500 ease-in-out">
      <h2 id="form-title" class="text-center text-3xl font-bold mb-10 text-gray-800">Login</h2>
      <form class="space-y-5">
        <input class="w-full h-12 border border-gray-800 px-3 rounded-lg" placeholder="Email" id="" name="" type="text">
        <input class="w-full h-12 border border-gray-800 px-3 rounded-lg" placeholder="Password" id="" name="" type="password">
        <button class="w-full h-12 bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" onclick="location.href='/Pages/admin/adminpage.html'">Sign in</button>

      </form>
    </div>
  </div>
</div>

</body>
</html>
