<body>

    <!-- Glass Navbar -->
    <div id="navbar"
    class="navbar fixed top-4 left-1/2 -translate-x-1/2 w-[85%]
    bg-white/10 backdrop-blur-md border border-white/20
    rounded-xl shadow-lg px-4 py-0 z-50
    transition-all duration-300">

        <!-- Logo -->
        <!-- Logo -->
<div class="flex-1">
    <a href="/index.html" style="color:#1a1a1a; font-size:1.1rem; font-weight:700;">Lumiere</a>
</div>

        <!-- Menu -->
        <div class="flex-none">
            <ul class="menu menu-horizontal px-1 text-sm text-black">
            <li><a href="/index.html" class="px-3 py-1 hover:bg-white/20 hover:text-yellow-400 rounded-lg">Home</a></li>
            <li><a href="/Pages/dashboard.html" class="px-3 py-1 hover:bg-white/20 hover:text-yellow-400 rounded-lg">Dashboard</a></li>

            <li><a href="/Pages/contact.html" class="px-3 py-1 hover:bg-white/20 hover:text-yellow-400 rounded-lg">Contact us</a></li>
            </ul>
        </div>

    </div>

    <script>
    let prevScroll = window.pageYOffset;
    const navbar = document.getElementById("navbar");
    window.onscroll = function(){
        let currentScroll = window.pageYOffset;
        if(prevScroll > currentScroll){
            navbar.classList.remove("nav-hidden");
        } else {
            navbar.classList.add("nav-hidden");
        }
        if(currentScroll > 50){
            navbar.classList.add("scale-95");
        } else {
            navbar.classList.remove("scale-95");
        }
        prevScroll = currentScroll;
    }
    </script>

    <!-- Hero Section -->
    <section class="hero-section">

        <div class="float-pin">📍</div>
        <div class="float-plane">✈️</div>

        <div class="hero-headline">
            <h1>
                Learn New Things
                <span class="headline-pill">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=200&q=80" alt="beach">
                </span>
                By<br>
                Traveling &nbsp;<span class="accent-word">New World</span>
            </h1>
        </div>

        <p class="hero-subtext">
            Discover breathtaking destinations, immerse yourself in new cultures, and
            create memories that last a lifetime. Your next adventure is just one step away.
        </p>

        <a href="/Pages/contact.html" class="cta-btn">Contact Us</a>

        <div class="tiles-row">

            <div class="tile">

            <div class="tile">
                <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=600&q=80" alt="Tropics">
            </div>
        </div>

    </section>

</body>
</html>
